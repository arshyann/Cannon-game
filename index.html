<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Final Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Force Black Background and Remove All Padding */
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            overflow: hidden; background: #000; position: fixed; 
        }
        
        #game-container { 
            width: 100%; height: 100%; display: flex; 
            align-items: center; justify-content: center; background: #000;
        }

        canvas { 
            display: block; background: #050505; 
            image-rendering: pixelated; touch-action: none;
        }

        #ui-layer { 
            position: absolute; inset: 0; pointer-events: none; 
            z-index: 100; display: flex; align-items: center; justify-content: center; 
        }

        .menu-box { 
            pointer-events: auto; background: rgba(0,0,0,0.9); padding: 30px; 
            border: 4px solid #0ff; color: #0ff; text-align: center; 
            box-shadow: 0 0 40px #0ff; border-radius: 20px; min-width: 300px;
        }

        button { 
            background: #0ff; border: none; padding: 20px 40px; 
            font-weight: bold; font-size: 24px; cursor: pointer; 
            margin-top: 20px; text-transform: uppercase; border-radius: 10px;
        }

        #perk-notify { 
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%); 
            font-size: 60px; color: #fff; text-shadow: 0 0 20px #f0f; 
            opacity: 0; transition: 0.3s; font-weight: 900;
        }

        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="main-menu" class="menu-box">
            <h1 style="margin:0; font-size: 50px;">TANK STRIKE</h1>
            <p style="color:#888; margin-bottom: 20px;">ID: <span id="my-id" style="color:#fff; letter-spacing: 2px;">----</span></p>
            <input type="number" id="join-id" style="padding:15px; width:180px; font-size: 20px; text-align:center; border: 2px solid #0ff; background:#111; color:#fff;" placeholder="ENEMY ID">
            <br>
            <button onclick="requestStart()">DEPLOY MATCH</button>
        </div>

        <div id="game-over" class="menu-box" style="display:none;">
            <h1 id="winner-text" style="font-size: 40px;">UNIT LOST</h1>
            <button id="host-rematch" onclick="requestRematch()" style="display:none;">RE-DEPLOY</button>
            <p id="wait-msg">WAITING FOR COMMANDER...</p>
        </div>
        <div id="perk-notify">CRITICAL HIT!</div>
    </div>
</div>

<script>
/** 1. SYSTEM & RESOLUTION **/
const V_WIDTH = 1920, V_HEIGHT = 1080;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let peer, conn, isHost = false, gameActive = false;
let obstacles = [], particles = [], goldenBox = null;
let lastBoxTime = 0, lastPerkType = "";

const joyL = { active: false, x: 0, y: 0, cx: 0, cy: 0, r: 110 };
const joyR = { active: false, x: 0, y: 0, cx: 0, cy: 0, r: 110 };

class Tank {
    constructor(x, y, color) {
        this.startX = x; this.startY = y;
        this.x = x; this.y = y; this.color = color;
        this.angle = 0; this.hp = 100; this.bullets = [];
        this.tx = x; this.ty = y; this.ta = 0; 
        this.perk = null; this.timer = 0; this.recoil = 0;
    }
    reset() {
        this.x = this.startX; this.y = this.startY; this.tx = this.startX; this.ty = this.startY;
        this.hp = 100; this.bullets = []; this.perk = null; this.timer = 0;
    }
    draw(isEnemy) {
        ctx.save();
        ctx.translate(this.x, this.y);
        let recoilPush = Math.sin(this.recoil) * 25; 
        ctx.rotate(this.angle);

        // Body
        ctx.fillStyle = this.color;
        ctx.fillRect(-50 - recoilPush, -50, 100, 100);
        
        // Camo / Texture
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(-40 - recoilPush, -30, 30, 30);
        ctx.fillRect(10 - recoilPush, 10, 20, 20);

        // Grey Front Pipe
        ctx.fillStyle = "#999";
        ctx.fillRect(0 - recoilPush, -18, 85, 36);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 3;
        ctx.strokeRect(0 - recoilPush, -18, 85, 36);
        ctx.restore();

        // HUD
        ctx.fillStyle = "#222"; ctx.fillRect(this.x-75, this.y-140, 150, 18);
        ctx.fillStyle = isEnemy ? "#ff4444" : "#44ff44";
        ctx.fillRect(this.x-75, this.y-140, (this.hp/100)*150, 18);
        if(this.timer > 0) {
            ctx.fillStyle = "#fff"; ctx.fillRect(this.x-75, this.y-160, (this.timer/480)*150, 8);
        }
    }
}

// FORCE OPPOSITE SPAWNS (Left vs Right)
const p1 = new Tank(150, 540, "#00aaff");
const p2 = new Tank(1770, 540, "#ff8800");

/** 2. FULLSCREEN & ORIENTATION LOGIC **/
async function requestStart() {
    // 1. Cover whole screen & Remove address bar
    const doc = document.documentElement;
    if (doc.requestFullscreen) {
        await doc.requestFullscreen().catch(e => console.log(e));
    } else if (doc.webkitRequestFullscreen) {
        await doc.webkitRequestFullscreen();
    }

    // 2. Force Landscape
    if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape').catch(e => console.log(e));
    }

    joinGame();
}

/** 3. CORE LOOP **/
function loop() {
    if(!gameActive) return;

    // Movement Clamped to map edges
    if(joyL.active) {
        let speed = p1.perk === 'PHANTOM' ? 14 : 8;
        let ang = Math.atan2(joyL.cy - joyL.y, joyL.cx - joyL.x);
        let nx = p1.x + Math.cos(ang) * speed;
        let ny = p1.y + Math.sin(ang) * speed;
        if(!checkObs(nx, ny) && nx > 70 && nx < V_WIDTH-70 && ny > 70 && ny < V_HEIGHT-70) {
            p1.x = nx; p1.y = ny;
            if(Math.random()>0.8) spawnPart(p1.x, p1.y, "#444", 2);
        }
    }

    if(joyR.active) {
        p1.angle = Math.atan2(joyR.cy - joyR.y, joyR.cx - joyR.x);
        let cd = p1.perk === 'RAPID' ? 100 : 450;
        if(Date.now() - (p1.lastFire || 0) > cd) {
            let isMega = p1.perk === 'CANNON' || Math.random() < 0.05;
            p1.bullets.push({x:p1.x, y:p1.y, a:p1.angle, s:24, d: isMega?100:15, r: isMega?35:12});
            p1.recoil = Math.PI; p1.lastFire = Date.now();
        }
    }
    p1.recoil *= 0.82;

    p1.bullets.forEach((b, i) => {
        b.x += Math.cos(b.a) * b.s; b.y += Math.sin(b.a) * b.s;
        if(checkObs(b.x, b.y)) { spawnPart(b.x, b.y, "#888", 10); p1.bullets.splice(i,1); }
        else if(Math.hypot(b.x-p2.x, b.y-p2.y) < 65) {
            conn.send({type:'HIT', dmg: b.d, x: b.x, y: b.y});
            spawnPart(b.x, b.y, "#f00", 25); p1.bullets.splice(i,1);
        }
    });

    if(isHost && !goldenBox && Date.now() - lastBoxTime > 5000) {
        let types = ['RAPID','SHIELD','PHANTOM','CANNON'].filter(t => t !== lastPerkType);
        let bx, by;
        do { bx = 300+Math.random()*1300; by = 200+Math.random()*680; } while(checkObs(bx, by));
        goldenBox = { x: bx, y: by, t: types[Math.floor(Math.random()*types.length)] };
        conn.send({type:'BOX', box: goldenBox}); lastBoxTime = Date.now();
    }

    if(goldenBox && Math.hypot(p1.x-goldenBox.x, p1.y-goldenBox.y) < 80) {
        p1.perk = goldenBox.t; p1.timer = 480; lastPerkType = goldenBox.t;
        showPerk(goldenBox.t); conn.send({type:'TAKEN'}); goldenBox = null;
    }

    p2.x += (p2.tx - p2.x) * 0.25; p2.y += (p2.ty - p2.y) * 0.25; p2.angle += (p2.ta - p2.angle) * 0.25;
    if(p1.timer > 0) p1.timer--;
    conn.send({type:'SYNC', x:p1.x, y:p1.y, a:p1.angle, hp:p1.hp, perk:p1.perk, bullets:p1.bullets, timer:p1.timer});

    draw();
    if(p1.hp <= 0 || p2.hp <= 0) endGame();
    else requestAnimationFrame(loop);
}

/** 4. RENDERING & FULLSCREEN COVERAGE **/
function draw() {
    // Dynamic Scale to cover whole screen without address bar
    const scaleX = window.innerWidth / V_WIDTH;
    const scaleY = window.innerHeight / V_HEIGHT;
    const scale = Math.max(scaleX, scaleY); // Cover fill
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // Center the 1920x1080 logic in the middle of the phone screen
    ctx.setTransform(scale, 0, 0, scale, (window.innerWidth - V_WIDTH*scale)/2, (window.innerHeight - V_HEIGHT*scale)/2);

    // Neon Map Border
    ctx.strokeStyle="#0ff"; ctx.lineWidth=12; ctx.shadowBlur=25; ctx.shadowColor="#0ff";
    ctx.strokeRect(0,0,V_WIDTH,V_HEIGHT); ctx.shadowBlur=0;

    obstacles.forEach(o => { ctx.fillStyle="#111"; ctx.fillRect(o.x,o.y,o.w,o.h); ctx.strokeStyle="#444"; ctx.strokeRect(o.x,o.y,o.w,o.h); });

    if(goldenBox) {
        ctx.save(); ctx.translate(goldenBox.x, goldenBox.y); ctx.rotate(Date.now()*0.01);
        ctx.fillStyle="gold"; ctx.shadowBlur=30; ctx.shadowColor="yellow"; ctx.fillRect(-35,-35,70,70); ctx.restore();
    }

    p1.draw(false); p2.draw(true);
    
    [...p1.bullets, ...p2.bullets].forEach(b => {
        ctx.fillStyle = b.d > 50 ? "#ff0000" : "#ffffff";
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.a -= 0.02;
        ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 8, 8);
        if(p.a <= 0) particles.splice(i,1);
    });
    ctx.globalAlpha = 1;

    drawJoy(joyL); drawJoy(joyR);
}

/** 5. UTILS & PEER **/
function initPeer() {
    peer = new Peer(Math.floor(1000 + Math.random() * 9000).toString());
    peer.on('open', i => document.getElementById('my-id').innerText = i);
    peer.on('connection', c => { conn = c; isHost = true; setupConn(); });
}

function joinGame() {
    const id = document.getElementById('join-id').value;
    if(id) { conn = peer.connect(id); isHost = false; setupConn(); }
    else if(isHost) { /* Already waiting */ }
}

function setupConn() {
    conn.on('open', () => {
        if(isHost) {
            obstacles = [{x: 400, y: 150, w: 100, h: 780}, {x: 1420, y: 150, w: 100, h: 780}, {x: 810, y: 440, w: 300, h: 200}];
            conn.send({type: 'START', obs: obstacles}); start();
        }
    });
    conn.on('data', d => {
        if(d.type === 'START') { obstacles = d.obs; start(); }
        if(d.type === 'SYNC') { p2.tx = d.x; p2.ty = d.y; p2.ta = d.a; p2.hp = d.hp; p2.perk = d.perk; p2.bullets = d.bullets; p2.timer = d.timer; }
        if(d.type === 'BOX') goldenBox = d.box;
        if(d.type === 'TAKEN') goldenBox = null;
        if(d.type === 'HIT') { 
            if(p1.perk !== 'SHIELD') p1.hp = Math.max(0, p1.hp - d.dmg);
            spawnPart(d.x, d.y, "#f00", 20);
        }
        if(d.type === 'RESET') resetGame();
    });
}

function start() {
    gameActive = true;
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    if(isHost) document.getElementById('host-rematch').style.display = 'block';
    requestAnimationFrame(loop);
}

function resetGame() { p1.reset(); p2.reset(); lastBoxTime = Date.now(); start(); }
function requestRematch() { if(isHost) { conn.send({type:'RESET'}); resetGame(); } }
function endGame() { gameActive = false; document.getElementById('game-over').style.display = 'block'; document.getElementById('winner-text').innerText = p1.hp > 0 ? "MISSION SUCCESS" : "MISSION FAILED"; }
function checkObs(x, y) { return obstacles.some(o => x+60 > o.x && x-60 < o.x+o.w && y+60 > o.y && y-60 < o.y+o.h); }
function spawnPart(x, y, c, count) { for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, a:1, c}); }
function showPerk(t) { const n = document.getElementById('perk-notify'); n.innerText = t + "!!"; n.style.opacity = 1; setTimeout(() => n.style.opacity = 0, 1500); }

function drawJoy(j) {
    if(!j.active) return;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.beginPath(); ctx.arc(j.x, j.y, j.r, 0, Math.PI*2); ctx.strokeStyle="rgba(0,255,255,0.4)"; ctx.stroke();
    ctx.beginPath(); ctx.arc(j.cx, j.cy, 55, 0, Math.PI*2); ctx.fillStyle="rgba(0,255,255,0.6)"; ctx.fill();
}

function touch(e) {
    e.preventDefault();
    for(let t of e.touches) {
        if(t.clientX < window.innerWidth/2) {
            if(!joyL.active) { joyL.x = t.clientX; joyL.y = t.clientY; joyL.active = true; joyL.id = t.identifier; }
            joyL.cx = t.clientX; joyL.cy = t.clientY;
        } else {
            if(!joyR.active) { joyR.x = t.clientX; joyR.y = t.clientY; joyR.active = true; joyR.id = t.identifier; }
            joyR.cx = t.clientX; joyR.cy = t.clientY;
        }
    }
}
canvas.addEventListener('touchstart', touch, {passive:false});
canvas.addEventListener('touchmove', touch, {passive:false});
canvas.addEventListener('touchend', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === joyL.id) joyL.active = false;
        if(t.identifier === joyR.id) joyR.active = false;
    }
});

initPeer();
</script>
</body>
</html>
