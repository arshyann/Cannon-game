<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Final Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; outline: none; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; position: fixed; font-family: sans-serif; }
        #game-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        canvas { display: block; background: #050505; touch-action: none; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .menu-box { pointer-events: auto; background: rgba(0,0,0,0.95); padding: 30px; border: 4px solid #0ff; color: #0ff; text-align: center; box-shadow: 0 0 40px #0ff; border-radius: 20px; }
        input { padding: 15px; width: 180px; font-size: 20px; text-align:center; border: 2px solid #0ff; background:#111; color:#fff; margin-bottom: 10px; }
        button { background: #0ff; border: none; padding: 15px 30px; font-weight: bold; font-size: 20px; cursor: pointer; border-radius: 10px; text-transform: uppercase; }
        #perk-notify { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 40px; color: #fff; text-shadow: 0 0 20px #f0f; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="main-menu" class="menu-box">
            <h1 style="margin:0 0 10px 0;">TANK STRIKE</h1>
            <p>YOUR ID: <span id="my-id" style="color:#fff; font-weight:bold;">connecting...</span></p>
            <input type="number" id="join-id" placeholder="HOST ID">
            <br>
            <button onclick="requestStart()">JOIN BATTLE</button>
            <p id="status" style="font-size:12px; color:#666;">Waiting for network...</p>
        </div>

        <div id="game-over" class="menu-box" style="display:none;">
            <h1 id="winner-text">UNIT LOST</h1>
            <button id="host-rematch" onclick="requestRematch()" style="display:none;">RE-DEPLOY</button>
            <p id="wait-msg">WAITING FOR COMMANDER...</p>
        </div>
        <div id="perk-notify">POWER UP!</div>
    </div>
</div>

<script>
const V_WIDTH = 1920, V_HEIGHT = 1080;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let peer, conn, isHost = false, gameActive = false;
let obstacles = [], particles = [], goldenBox = null;
let lastBoxTime = 0;

const joyL = { active: false, x: 0, y: 0, cx: 0, cy: 0, r: 100 };
const joyR = { active: false, x: 0, y: 0, cx: 0, cy: 0, r: 100 };

class Tank {
    constructor(x, y, color) {
        this.startX = x; this.startY = y;
        this.x = x; this.y = y; this.color = color;
        this.angle = 0; this.hp = 100; this.bullets = [];
        this.tx = x; this.ty = y; this.ta = 0; 
        this.perk = null; this.timer = 0; this.recoil = 0;
    }
    reset() {
        this.x = this.startX; this.y = this.startY; this.tx = this.startX; this.ty = this.startY;
        this.hp = 100; this.bullets = []; this.perk = null; this.timer = 0;
    }
    draw(isEnemy) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        let kick = Math.sin(this.recoil) * 20;
        ctx.fillStyle = this.color;
        ctx.fillRect(-45 - kick, -45, 90, 90);
        ctx.fillStyle = "#888"; // Front Pipe Grey
        ctx.fillRect(0 - kick, -15, 75, 30);
        ctx.restore();

        // HP Bar
        ctx.fillStyle = "#222"; ctx.fillRect(this.x-60, this.y-110, 120, 12);
        ctx.fillStyle = isEnemy ? "#f44" : "#4f4";
        ctx.fillRect(this.x-60, this.y-110, (this.hp/100)*120, 12);
    }
}

// Fixed Spawn Points (Left vs Right)
const p1 = new Tank(200, 540, "#00aaff");
const p2 = new Tank(1720, 540, "#ff8800");

/** NETWORK FIX FOR GITHUB **/
function initPeer() {
    // Generate simple ID
    const myCustomId = Math.floor(1000 + Math.random() * 9000).toString();
    
    // Force SSL for GitHub Pages
    peer = new Peer(myCustomId, {
        debug: 2,
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        document.getElementById('my-id').innerText = id;
        document.getElementById('status').innerText = "Ready for combat";
    });

    peer.on('connection', c => {
        if(conn) conn.close(); // Clean up old connections
        conn = c;
        isHost = true;
        setupConn();
    });

    peer.on('error', err => {
        console.error(err);
        document.getElementById('status').innerText = "Error: " + err.type;
        if(err.type === 'unavailable-id') initPeer();
    });
}

async function requestStart() {
    // Fullscreen for mobile
    const doc = document.documentElement;
    if (doc.requestFullscreen) doc.requestFullscreen();
    if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(() => {});

    const targetId = document.getElementById('join-id').value;
    if(targetId) {
        conn = peer.connect(targetId, { reliable: true });
        isHost = false;
        setupConn();
    }
}

function setupConn() {
    conn.on('open', () => {
        document.getElementById('status').innerText = "Synchronizing...";
        if(isHost) {
            obstacles = [
                {x: 450, y: 150, w: 60, h: 780},
                {x: 1410, y: 150, w: 60, h: 780},
                {x: 810, y: 390, w: 300, h: 300}
            ];
            // Initial data burst to wake up Joiner
            setTimeout(() => {
                conn.send({ type: 'START', obs: obstacles });
                startMatch();
            }, 500);
        }
    });

    conn.on('data', d => {
        if(d.type === 'START') { obstacles = d.obs; startMatch(); }
        if(d.type === 'SYNC') {
            p2.tx = d.x; p2.ty = d.y; p2.ta = d.a; p2.hp = d.hp; 
            p2.perk = d.perk; p2.bullets = d.bullets;
        }
        if(d.type === 'BOX') goldenBox = d.box;
        if(d.type === 'TAKEN') goldenBox = null;
        if(d.type === 'HIT') {
            if(p1.perk !== 'SHIELD') p1.hp = Math.max(0, p1.hp - d.dmg);
            spawnPart(d.x, d.y, "#f00", 15);
        }
        if(d.type === 'RESET') resetGame();
    });

    conn.on('close', () => {
        location.reload(); // Reload on disconnect
    });
}

function startMatch() {
    gameActive = true;
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    if(isHost) document.getElementById('host-rematch').style.display = 'block';
    requestAnimationFrame(loop);
}

function loop() {
    if(!gameActive) return;

    // Movement
    if(joyL.active) {
        let speed = p1.perk === 'PHANTOM' ? 13 : 7;
        let ang = Math.atan2(joyL.cy - joyL.y, joyL.cx - joyL.x);
        let nx = p1.x + Math.cos(ang) * speed;
        let ny = p1.y + Math.sin(ang) * speed;
        if(!checkObs(nx, ny) && nx > 60 && nx < V_WIDTH-60 && ny > 60 && ny < V_HEIGHT-60) {
            p1.x = nx; p1.y = ny;
        }
    }

    // Firing
    if(joyR.active) {
        p1.angle = Math.atan2(joyR.cy - joyR.y, joyR.cx - joyR.x);
        let cd = p1.perk === 'RAPID' ? 120 : 450;
        if(Date.now() - (p1.lastFire || 0) > cd) {
            let isCrit = Math.random() < 0.05; // Random 5% One-Shot
            p1.bullets.push({x:p1.x, y:p1.y, a:p1.angle, s:22, d: isCrit?100:15, r: isCrit?30:10});
            p1.recoil = Math.PI; p1.lastFire = Date.now();
        }
    }
    p1.recoil *= 0.8;

    // Bullet Logic
    p1.bullets.forEach((b, i) => {
        b.x += Math.cos(b.a) * b.s; b.y += Math.sin(b.a) * b.s;
        if(checkObs(b.x, b.y)) p1.bullets.splice(i,1);
        else if(Math.hypot(b.x-p2.x, b.y-p2.y) < 60) {
            conn.send({type:'HIT', dmg: b.d, x: b.x, y: b.y});
            spawnPart(b.x, b.y, "#f00", 20); p1.bullets.splice(i,1);
        }
    });

    // Box Logic (Host Only)
    if(isHost && !goldenBox && Date.now() - lastBoxTime > 5000) {
        let bx, by;
        do { bx = 300+Math.random()*1300; by = 200+Math.random()*680; } while(checkObs(bx, by));
        goldenBox = { x: bx, y: by, t: ['RAPID','SHIELD','PHANTOM','CANNON'][Math.floor(Math.random()*4)] };
        conn.send({type:'BOX', box: goldenBox});
        lastBoxTime = Date.now();
    }

    if(goldenBox && Math.hypot(p1.x-goldenBox.x, p1.y-goldenBox.y) < 70) {
        p1.perk = goldenBox.t; p1.timer = 480;
        document.getElementById('perk-notify').innerText = goldenBox.t + "!";
        document.getElementById('perk-notify').style.opacity = 1;
        setTimeout(()=>document.getElementById('perk-notify').style.opacity=0, 1000);
        conn.send({type:'TAKEN'}); goldenBox = null;
    }

    // Sync
    p2.x += (p2.tx - p2.x) * 0.2; p2.y += (p2.ty - p2.y) * 0.2; p2.angle += (p2.ta - p2.angle) * 0.2;
    if(p1.timer > 0) p1.timer--;
    if(conn && conn.open) conn.send({type:'SYNC', x:p1.x, y:p1.y, a:p1.angle, hp:p1.hp, perk:p1.perk, bullets:p1.bullets});

    render();
    if(p1.hp <= 0 || p2.hp <= 0) endGame();
    else requestAnimationFrame(loop);
}

function render() {
    const sw = window.innerWidth / V_WIDTH, sh = window.innerHeight / V_HEIGHT;
    const s = Math.max(sw, sh);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.setTransform(s,0,0,s,(window.innerWidth-V_WIDTH*s)/2, (window.innerHeight-V_HEIGHT*s)/2);

    // Neon Border
    ctx.strokeStyle="#0ff"; ctx.lineWidth=10; ctx.shadowBlur=20; ctx.shadowColor="#0ff";
    ctx.strokeRect(0,0,V_WIDTH,V_HEIGHT); ctx.shadowBlur=0;

    obstacles.forEach(o => { ctx.fillStyle="#111"; ctx.fillRect(o.x,o.y,o.w,o.h); ctx.strokeStyle="#333"; ctx.strokeRect(o.x,o.y,o.w,o.h); });
    
    if(goldenBox) {
        ctx.save(); ctx.translate(goldenBox.x, goldenBox.y); ctx.rotate(Date.now()*0.005);
        ctx.fillStyle="gold"; ctx.shadowBlur=20; ctx.shadowColor="gold"; ctx.fillRect(-30,-30,60,60); ctx.restore();
    }

    p1.draw(false); p2.draw(true);
    [...p1.bullets, ...p2.bullets].forEach(b => {
        ctx.fillStyle = b.d > 50 ? "#f00" : "#fff";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.a -= 0.02;
        ctx.globalAlpha = p.a; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 6, 6);
        if(p.a <= 0) particles.splice(i,1);
    });
    ctx.globalAlpha = 1;

    // Joysticks
    drawJoy(joyL); drawJoy(joyR);
}

function drawJoy(j) {
    if(!j.active) return;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.beginPath(); ctx.arc(j.x, j.y, j.r, 0, Math.PI*2); ctx.strokeStyle="rgba(0,255,255,0.2)"; ctx.stroke();
    ctx.beginPath(); ctx.arc(j.cx, j.cy, 45, 0, Math.PI*2); ctx.fillStyle="rgba(0,255,255,0.4)"; ctx.fill();
}

function touch(e) {
    e.preventDefault();
    for(let t of e.touches) {
        if(t.clientX < window.innerWidth/2) {
            if(!joyL.active) { joyL.x = t.clientX; joyL.y = t.clientY; joyL.active = true; joyL.id = t.identifier; }
            joyL.cx = t.clientX; joyL.cy = t.clientY;
        } else {
            if(!joyR.active) { joyR.x = t.clientX; joyR.y = t.clientY; joyR.active = true; joyR.id = t.identifier; }
            joyR.cx = t.clientX; joyR.cy = t.clientY;
        }
    }
}
canvas.addEventListener('touchstart', touch, {passive:false});
canvas.addEventListener('touchmove', touch, {passive:false});
canvas.addEventListener('touchend', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === joyL.id) joyL.active = false;
        if(t.identifier === joyR.id) joyR.active = false;
    }
});

function checkObs(x, y) { return obstacles.some(o => x+50 > o.x && x-50 < o.x+o.w && y+50 > o.y && y-50 < o.y+o.h); }
function spawnPart(x, y, c, count) { for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, a:1, c}); }
function endGame() { gameActive = false; document.getElementById('game-over').style.display = 'block'; document.getElementById('winner-text').innerText = p1.hp > 0 ? "VICTORY" : "DEFEAT"; }
function requestRematch() { if(isHost) { conn.send({type:'RESET'}); resetGame(); } }
function resetGame() { p1.reset(); p2.reset(); lastBoxTime = Date.now(); startMatch(); }

initPeer();
</script>
</body>
</html>
