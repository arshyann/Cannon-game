<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Full Screen Perks</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; background: #111; width: 100vw; height: 100vh; }
        
        #menu, #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 25px; border-radius: 15px; text-align: center; z-index: 50; border: 3px solid #2ecc71; width: 280px; }
        #game-over { display: none; border-color: #f1c40f; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; background: #222; color: white; text-align: center; font-size: 20px; }
        button { padding: 12px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 8px; }
        
        #host-id-display { margin: 10px 0; color: #f1c40f; font-size: 32px; font-weight: bold; }
        .joystick-container { position: absolute; bottom: 8%; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        #move-stick { left: 40px; }
        #fire-stick { right: 40px; }
        .stick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 35px; left: 35px; }
        
        #announcer { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 35px; color: #f1c40f; font-weight: bold; display: none; pointer-events: none; z-index: 100; text-shadow: 2px 2px #000; }
        #leave-btn { position: absolute; top: 10px; right: 10px; background: #c0392b; padding: 8px 15px; display: none; border: none; border-radius: 5px; color: white; z-index: 60; }
    </style>
</head>
<body>

<div id="announcer">SMASHER!</div>
<button id="leave-btn" onclick="location.reload()">LEAVE</button>

<div id="menu">
    <h2 style="margin:0 0 10px 0;">TANK STRIKE</h2>
    <div class="controls">
        <button onclick="startHost()">HOST GAME</button>
        <div id="host-id-display">----</div>
        <input type="number" id="join-id" placeholder="CODE">
        <button style="background:#3498db" onclick="startJoin()">JOIN ROOM</button>
    </div>
</div>

<div id="game-over">
    <h1 id="result-text">WASTED</h1>
    <button id="restart-btn" style="background:#f39c12; width:100%; display:none;" onclick="hostRequestReset()">PLAY AGAIN</button>
</div>

<div id="move-stick" class="joystick-container"><div class="stick"></div></div>
<div id="fire-stick" class="joystick-container"><div class="stick"></div></div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game Logic Constants
    const GAME_W = 1400; // Wider for full screen
    const GAME_H = 800;  // Taller for full screen
    let scale = 1, obstacles = [], peer, conn, isHost = false, gameRunning = false, lastFire = 0;
    let perk = null, perkTimer = 0;
    let lastContactDamage = 0;

    function resize() {
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        scale = Math.min(winW / GAME_W, winH / GAME_H);
        canvas.width = winW;
        canvas.height = winH;
        // Center the game on the canvas
        ctx.setTransform(scale, 0, 0, scale, (winW - GAME_W * scale) / 2, (winH - GAME_H * scale) / 2);
    }
    window.addEventListener('resize', resize); resize();

    const createPlayer = (x, y, color, angle) => ({
        x, y, angle, color, bullets: [], hp: 10, size: 22, speed: 4, fireRate: 350, bSize: 4, bDmg: 1, perkName: ""
    });

    let p1 = createPlayer(150, 400, '#e74c3c', 0);
    let p2 = createPlayer(1250, 400, '#3498db', Math.PI);

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('error', () => initPeer(Math.floor(1000 + Math.random() * 9000).toString()));
    }
    initPeer(Math.floor(1000 + Math.random() * 9000).toString());

    function startHost() {
        isHost = true;
        obstacles = [];
        for(let i=0; i<6; i++) obstacles.push({ x: 450+Math.random()*500, y: 150+Math.random()*400, w: 35, h: 180 });
        document.getElementById('host-id-display').innerText = peer.id;
        peer.on('connection', (c) => { conn = c; setupConn(); });
    }

    function startJoin() {
        conn = peer.connect(document.getElementById('join-id').value);
        setupConn();
    }

    function setupConn() {
        conn.on('open', () => {
            if(isHost) conn.send({ type: 'start', obs: obstacles });
            startUI();
        });
        conn.on('data', (data) => {
            let op = isHost ? p2 : p1;
            if(data.type === 'start') { obstacles = data.obs; startUI(); }
            if(data.type === 'move') {
                op.x = data.x; op.y = data.y; op.angle = data.angle; op.size = data.size; op.perkName = data.perk; op.hp = data.hp;
                if(data.shot) op.bullets.push({x: data.x, y: data.y, vx: Math.cos(data.angle)*25, vy: Math.sin(data.angle)*25, s: data.bs, d: data.bd});
            }
            if(data.type === 'perk-spawn') perk = data.perk;
            if(data.type === 'perk-get') { announce(data.name); perk = null; }
            if(data.type === 'reset') applyReset(data.obs);
        });
    }

    function startUI() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('leave-btn').style.display = 'block';
        document.querySelectorAll('.joystick-container').forEach(j => j.style.display = 'block');
        if(!gameRunning) { gameRunning = true; loop(); }
    }

    function hostRequestReset() {
        obstacles = [];
        for(let i=0; i<6; i++) obstacles.push({ x: 450+Math.random()*500, y: 150+Math.random()*400, w: 35, h: 180 });
        conn.send({ type: 'reset', obs: obstacles });
        applyReset(obstacles);
    }

    function applyReset(newObs) {
        obstacles = newObs;
        p1 = createPlayer(150, 400, '#e74c3c', 0);
        p2 = createPlayer(1250, 400, '#3498db', Math.PI);
        perk = null; perkTimer = 0;
        document.getElementById('game-over').style.display = 'none';
        gameRunning = true;
    }

    function announce(txt) {
        const a = document.getElementById('announcer');
        a.innerText = txt; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 1000);
    }

    const mIn = { x: 0, y: 0 }, fIn = { x: 0, y: 0, act: false };
    function stick(id, obj) {
        const el = document.getElementById(id), s = el.querySelector('.stick');
        el.addEventListener('touchstart', (e) => e.preventDefault());
        window.addEventListener('touchmove', (e) => {
            const t = Array.from(e.touches).find(v => v.target.closest('#' + id));
            if (!t) return;
            const r = el.getBoundingClientRect(), dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 45), a = Math.atan2(dy, dx);
            obj.x = Math.cos(a)*(d/45); obj.y = Math.sin(a)*(d/45);
            if(id === 'fire-stick') obj.act = true;
            s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        window.addEventListener('touchend', () => { obj.x = 0; obj.y = 0; obj.act = false; s.style.transform = `translate(0,0)`; });
    }
    stick('move-stick', mIn); stick('fire-stick', fIn);

    function loop() {
        if (!gameRunning) { requestAnimationFrame(loop); return; }
        let me = isHost ? p1 : p2, op = isHost ? p2 : p1;

        // Perk Spawner
        if(isHost && !perk && Math.random() < 0.005) {
            perk = { x: 300 + Math.random()*800, y: 150 + Math.random()*500, type: Math.floor(Math.random()*7) };
            conn.send({ type: 'perk-spawn', perk: perk });
        }

        // Perk Pickup
        if(perk && Math.hypot(me.x - perk.x, me.y - perk.y) < 45) {
            const list = ["SMALL TANK", "TURBO SPEED", "RATE OF FIRE", "HEAVY SHELLS", "ONE-TOUCH", "SHIELD", "SMASHER"];
            const pKey = ["tiny", "speed", "rapid", "heavy", "insta", "shield", "smasher"];
            const pIdx = Math.floor(Math.random() * pKey.length);
            me.perkName = pKey[pIdx];
            perkTimer = Date.now() + 5000;
            conn.send({ type: 'perk-get', name: list[pIdx] });
            announce(list[pIdx]);
            perk = null;
        }

        // Reset Perk Stats (Fixes Turbo Reset)
        if(Date.now() > perkTimer) {
            me.perkName = "";
            me.speed = 4; // Default speed
            me.size = 22;
            me.fireRate = 350;
            me.bSize = 4;
            me.bDmg = 1;
        } else {
            if(me.perkName === "tiny") me.size = 11;
            if(me.perkName === "speed") me.speed = 10;
            if(me.perkName === "rapid") me.fireRate = 70;
            if(me.perkName === "insta") { me.fireRate = 1200; me.bDmg = 10; me.bSize = 6; }
            if(me.perkName === "heavy") me.bSize = 20;
            if(me.perkName === "smasher") {
                if(Math.hypot(me.x - op.x, me.y - op.y) < me.size + op.size && Date.now() - lastContactDamage > 500) {
                    op.hp -= 1;
                    lastContactDamage = Date.now();
                }
            }
        }

        // Move
        let nx = me.x + mIn.x*me.speed, ny = me.y + mIn.y*me.speed;
        let ok = nx > 30 && nx < GAME_W-30 && ny > 30 && ny < GAME_H-30;
        obstacles.forEach(o => { if(nx > o.x-me.size && nx < o.x+o.w+me.size && ny > o.y-me.size && ny < o.y+o.h+me.size) ok = false; });
        if(ok) { me.x = nx; me.y = ny; }

        // Shot sync
        let shot = false;
        if (fIn.act && Date.now() - lastFire > me.fireRate) {
            me.angle = Math.atan2(fIn.y, fIn.x);
            me.bullets.push({x: me.x, y: me.y, vx: Math.cos(me.angle)*25, vy: Math.sin(me.angle)*25, s: me.bSize, d: me.bDmg});
            lastFire = Date.now(); shot = true;
        }
        conn.send({ type: 'move', x: me.x, y: me.y, angle: me.angle, shot, size: me.size, perk: me.perkName, hp: me.hp, bs: me.bSize, bd: me.bDmg });

        // Bullet Logic
        [me, op].forEach(p => {
            p.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) p.bullets.splice(i, 1); });
                if (p === op && Math.hypot(b.x-me.x, b.y-me.y) < me.size + 10) {
                    p.bullets.splice(i, 1);
                    if(me.perkName !== "shield") { me.hp -= b.d; if(me.hp <= 0) endGame("WASTED"); }
                }
                if (b.x < -100 || b.x > GAME_W+100 || b.y < -100 || b.y > GAME_H+100) p.bullets.splice(i, 1);
            });
        });
        if(op.hp <= 0) endGame("VICTORY");

        // DRAW
        ctx.clearRect(-200, -200, GAME_W+400, GAME_H+400); // Clear large area
        ctx.strokeStyle = "#333"; ctx.lineWidth = 5; ctx.strokeRect(0, 0, GAME_W, GAME_H); // Border
        obstacles.forEach(o => { ctx.fillStyle = "#444"; ctx.fillRect(o.x, o.y, o.w, o.h); });
        
        if(perk) { 
            ctx.fillStyle = "gold"; 
            ctx.shadowBlur = 10; ctx.shadowColor = "gold";
            ctx.fillRect(perk.x-18, perk.y-18, 36, 36); 
            ctx.shadowBlur = 0;
        }
        
        [me, op].forEach(p => {
            if(p.hp <= 0) return;
            // Bars
            ctx.fillStyle = "#222"; ctx.fillRect(p.x-30, p.y-50, 60, 6); // HP Background
            ctx.fillStyle = p.color; ctx.fillRect(p.x-30, p.y-50, (p.hp/10)*60, 6); // HP Fill
            
            // PERK TIMER (Fixed visibility)
            if(Date.now() < perkTimer && p.perkName !== "") {
                let pTime = (perkTimer - Date.now()) / 5000;
                ctx.fillStyle = "gold"; ctx.fillRect(p.x-30, p.y-60, pTime*60, 4);
            }
            
            if(p.perkName === "shield") { ctx.strokeStyle = "cyan"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(p.x, p.y, p.size+12, 0, 7); ctx.stroke(); }
            if(p.perkName === "smasher") { ctx.strokeStyle = "orange"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(p.x, p.y, p.size+5, 0, 7); ctx.stroke(); }

            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
            ctx.fillStyle = p.color; ctx.fillRect(-p.size, -p.size, p.size*2, p.size*2);
            ctx.fillStyle = "black"; ctx.fillRect(p.size/2, -5, p.size, 10); ctx.restore();
            p.bullets.forEach(b => { ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(b.x, b.y, b.s, 0, 7); ctx.fill(); });
        });
        requestAnimationFrame(loop);
    }

    function endGame(m) { gameRunning = false; document.getElementById('game-over').style.display='block'; document.getElementById('result-text').innerText=m; document.getElementById('restart-btn').style.display = isHost ? 'block' : 'none'; }
</script>
</body>
</html>
