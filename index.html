<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Balanced</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        #ui > * { pointer-events: auto; }
        #menu, #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 25px; border-radius: 12px; text-align: center; border: 3px solid #2ecc71; width: 280px; color: white; }
        #game-over { display: none; border-color: #f1c40f; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; background: #333; color: #fff; text-align: center; font-size: 18px; width: 100%; box-sizing: border-box; }
        button { padding: 12px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 8px; text-transform: uppercase; }
        #host-id { margin: 5px 0; color: #f1c40f; font-size: 28px; font-weight: bold; }
        .joy-con { position: absolute; bottom: 10%; width: 130px; height: 130px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #m-joy { left: 40px; }
        #f-joy { right: 40px; }
        .stick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 40px; left: 40px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="menu">
        <h2 style="margin:0 0 10px 0">TANK STRIKE</h2>
        <div class="controls">
            <button onclick="goFull(); startHost();">HOST</button>
            <div id="host-id">----</div>
            <input type="number" id="join-code" placeholder="CODE">
            <button style="background:#3498db" onclick="goFull(); startJoin();">JOIN</button>
        </div>
    </div>
    <div id="game-over">
        <h1 id="res-txt" style="margin:0">WINNER!</h1>
        <button id="restart-btn" style="background:#f39c12; width:100%; margin-top:15px;" onclick="hostReset()">PLAY AGAIN</button>
    </div>
    <div id="m-joy" class="joy-con"><div class="stick"></div></div>
    <div id="f-joy" class="joy-con"><div class="stick"></div></div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GW = 1920, GH = 1080;
    let scale = 1, obstacles = [], peer, conn, isHost = false, gameRun = false;

    async function goFull() {
        try {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch(e) {}
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        scale = Math.min(canvas.width / GW, canvas.height / GH);
        ctx.setTransform(scale, 0, 0, scale, (canvas.width - GW * scale) / 2, (canvas.height - GH * scale) / 2);
    }
    window.addEventListener('resize', resize); resize();

    const createP = (x, y, col) => ({
        x, y, ang: 0, col, bullets: [], hp: 10, sz: 35, spd: 5.5, fr: 300
    });

    let p1 = createP(300, 540, '#ff4757'); // Red
    let p2 = createP(1620, 540, '#3498db'); // Blue

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('open', id => document.getElementById('host-id').innerText = id);
        peer.on('error', () => initPeer(Math.floor(1000 + Math.random() * 9000).toString()));
    }
    initPeer(Math.floor(1000 + Math.random() * 9000).toString());

    function generateObs() {
        obstacles = [
            {x: 800, y: 150, w: 40, h: 250},
            {x: 1080, y: 680, w: 40, h: 250},
            {x: 940, y: 440, w: 40, h: 200}
        ];
    }

    function startHost() {
        isHost = true; generateObs();
        peer.on('connection', c => { conn = c; setupSync(); });
    }

    function startJoin() {
        conn = peer.connect(document.getElementById('join-code').value);
        setupSync();
    }

    function setupSync() {
        conn.on('open', () => {
            if(isHost) conn.send({ type: 'init', obs: obstacles });
            startGame();
        });
        conn.on('data', d => {
            if(d.type === 'init') { obstacles = d.obs; startGame(); }
            if(d.type === 'sync') {
                let target = isHost ? p2 : p1;
                target.x = d.x; target.y = d.y; target.ang = d.ang; target.hp = d.hp;
                if(d.shot) target.bullets.push({x: d.x, y: d.y, vx: Math.cos(d.ang)*22, vy: Math.sin(d.ang)*22});
            }
            if(d.type === 'rst') resetAll(d.obs);
        });
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-over').style.display = 'none';
        document.querySelectorAll('.joy-con').forEach(j => j.style.display = 'block');
        if(!gameRun) { gameRun = true; loop(); }
    }

    function hostReset() {
        generateObs();
        if(conn) conn.send({ type: 'rst', obs: obstacles });
        resetAll(obstacles);
    }

    function resetAll(o) {
        obstacles = o;
        p1 = createP(300, 540, '#ff4757');
        p2 = createP(1620, 540, '#3498db');
        document.getElementById('game-over').style.display = 'none';
        gameRun = true;
    }

    const mv = { x: 0, y: 0 }, fr = { x: 0, y: 0, act: false };
    let lastFire = 0;

    function handleJoy(id, obj) {
        const el = document.getElementById(id), s = el.querySelector('.stick');
        el.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
        window.addEventListener('touchmove', e => {
            const t = Array.from(e.touches).find(v => v.target.closest('#' + id));
            if (!t) return;
            const r = el.getBoundingClientRect(), dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50), a = Math.atan2(dy, dx);
            obj.x = Math.cos(a)*(d/50); obj.y = Math.sin(a)*(d/50);
            if(id === 'f-joy' && d > 10) obj.act = true;
            s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        }, {passive:false});
        window.addEventListener('touchend', () => { obj.x = 0; obj.y = 0; obj.act = false; s.style.transform = `translate(0,0)`; });
    }
    handleJoy('m-joy', mv); handleJoy('f-joy', fr);

    function loop() {
        if (!gameRun) { requestAnimationFrame(loop); return; }
        
        let me = isHost ? p1 : p2, op = isHost ? p2 : p1;

        // Move
        let nx = me.x + mv.x*me.spd, ny = me.y + mv.y*me.spd;
        let ok = nx > 40 && nx < GW-40 && ny > 40 && ny < GH-40;
        obstacles.forEach(o => { if(nx > o.x-me.sz && nx < o.x+o.w+me.sz && ny > o.y-me.sz && ny < o.y+o.h+me.sz) ok = false; });
        if(ok) { me.x = nx; me.y = ny; }

        let shot = false;
        if (fr.act && Date.now() - lastFire > me.fr) {
            me.ang = Math.atan2(fr.y, fr.x);
            me.bullets.push({x: me.x, y: me.y, vx: Math.cos(me.ang)*22, vy: Math.sin(me.ang)*22});
            lastFire = Date.now(); shot = true;
        }

        // Sync outgoing
        if(conn && conn.open) conn.send({ type: 'sync', x: me.x, y: me.y, ang: me.ang, shot, hp: me.hp });

        // Bullet Logic
        [me, op].forEach(p => {
            p.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) p.bullets.splice(i, 1); });
                if (p === op && Math.hypot(b.x-me.x, b.y-me.y) < me.sz + 10) {
                    p.bullets.splice(i, 1); me.hp -= 1;
                }
                if (b.x < 0 || b.x > GW || b.y < 0 || b.y > GH) p.bullets.splice(i, 1);
            });
        });

        if(me.hp <= 0 || op.hp <= 0) {
            gameRun = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('res-txt').innerText = me.hp <= 0 ? "LOST" : "VICTORY";
            document.getElementById('restart-btn').style.display = isHost ? 'block' : 'none';
        }

        // Draw
        ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        resize();
        ctx.strokeStyle = "#333"; ctx.lineWidth = 10; ctx.strokeRect(0,0,GW,GH);
        obstacles.forEach(o => { ctx.fillStyle = "#222"; ctx.fillRect(o.x, o.y, o.w, o.h); });

        [p1, p2].forEach(p => {
            ctx.fillStyle = "#111"; ctx.fillRect(p.x-50, p.y-70, 100, 8);
            ctx.fillStyle = p.col; ctx.fillRect(p.x-50, p.y-70, (Math.max(0, p.hp)/10)*100, 8);
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.ang);
            ctx.fillStyle = p.col; ctx.fillRect(-p.sz, -p.sz, p.sz*2, p.sz*2);
            ctx.fillStyle = "#000"; ctx.fillRect(p.sz/2, -7, p.sz, 14); ctx.restore();
            p.bullets.forEach(b => { ctx.fillStyle = "#fff200"; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, 7); ctx.fill(); });
        });
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
