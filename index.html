<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Final Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        #ui > * { pointer-events: auto; }
        #menu, #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15,15,15,0.95); padding: 30px; border-radius: 15px; text-align: center; border: 3px solid #2ecc71; width: 300px; color: white; }
        #game-over { display: none; border-color: #f1c40f; z-index: 100; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; background: #333; color: #fff; text-align: center; font-size: 20px; width: 100%; }
        button { padding: 12px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 8px; text-transform: uppercase; }
        #host-id { margin: 10px 0; color: #f1c40f; font-size: 32px; font-weight: bold; }
        .joy-con { position: absolute; bottom: 10%; width: 130px; height: 130px; background: rgba(255,255,255,0.08); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #m-joy { left: 40px; }
        #f-joy { right: 40px; }
        .stick { position: absolute; width: 55px; height: 55px; background: rgba(255,255,255,0.3); border-radius: 50%; top: 37.5px; left: 37.5px; }
        #announcer { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 40px; color: #f1c40f; font-weight: bold; display: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="announcer">PERK GET!</div>
    <div id="menu">
        <h2 style="margin-top:0">TANK STRIKE</h2>
        <div class="controls">
            <button onclick="goFull(); startHost();">HOST GAME</button>
            <div id="host-id">----</div>
            <input type="number" id="join-code" placeholder="ROOM CODE">
            <button style="background:#3498db" onclick="goFull(); startJoin();">JOIN GAME</button>
        </div>
    </div>

    <div id="game-over">
        <h1 id="res-txt">GAME OVER</h1>
        <p id="winner-name"></p>
        <button id="restart-btn" style="background:#f39c12; width:100%;" onclick="hostReset()">PLAY AGAIN</button>
    </div>

    <div id="m-joy" class="joy-con"><div class="stick"></div></div>
    <div id="f-joy" class="joy-con"><div class="stick"></div></div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GW = 1800, GH = 950; // Max Boundaries
    let scale = 1, obstacles = [], peer, conn, isHost = false, gameRun = false;
    let perk = null, perkTimer = 0, lastFire = 0;

    async function goFull() {
        try {
            const doc = document.documentElement;
            if (doc.requestFullscreen) await doc.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch(e) {}
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        scale = Math.min(canvas.width / GW, canvas.height / GH);
        ctx.setTransform(scale, 0, 0, scale, (canvas.width - GW * scale) / 2, (canvas.height - GH * scale) / 2);
    }
    window.addEventListener('resize', resize); resize();

    const createP = (x, y, col, ang) => ({
        x, y, ang, col, bullets: [], hp: 10, sz: 28, spd: 4.5, fr: 350, bs: 5, bd: 1, perk: ""
    });

    // P1 = RED, P2 = BLUE
    let p1 = createP(200, 475, '#ff4757', 0);
    let p2 = createP(1600, 475, '#3498db', Math.PI);

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('error', () => initPeer(Math.floor(1000 + Math.random() * 9000).toString()));
    }
    initPeer(Math.floor(1000 + Math.random() * 9000).toString());

    function generateSpacedObstacles() {
        obstacles = [];
        const spots = [
            {x: 600, y: 150}, {x: 1100, y: 600}, 
            {x: 850, y: 350}, {x: 600, y: 700}
        ];
        // Shuffle and pick 3-4
        spots.sort(() => Math.random() - 0.5);
        for(let i=0; i<3; i++) {
            obstacles.push({ x: spots[i].x, y: spots[i].y, w: 45, h: 220 });
        }
    }

    function startHost() {
        isHost = true;
        generateSpacedObstacles();
        document.getElementById('host-id').innerText = peer.id;
        peer.on('connection', c => { conn = c; setupSync(); });
    }

    function startJoin() {
        conn = peer.connect(document.getElementById('join-code').value);
        setupSync();
    }

    function setupSync() {
        conn.on('open', () => {
            if(isHost) conn.send({ type: 'init', obs: obstacles });
            startGame();
        });
        conn.on('data', d => {
            let target = isHost ? p2 : p1;
            if(d.type === 'init') { obstacles = d.obs; startGame(); }
            if(d.type === 'sync') {
                target.x = d.x; target.y = d.y; target.ang = d.ang; 
                target.sz = d.sz; target.perk = d.perk; target.hp = d.hp;
                if(d.shot) target.bullets.push({x: d.x, y: d.y, vx: Math.cos(d.ang)*25, vy: Math.sin(d.ang)*25, s: d.bs, d: d.bd});
            }
            if(d.type === 'pk-sp') perk = d.pk;
            if(d.type === 'pk-get') { announce(d.n); perk = null; }
            if(d.type === 'rst') resetAll(d.obs);
        });
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-over').style.display = 'none';
        document.querySelectorAll('.joy-con').forEach(j => j.style.display = 'block');
        resize();
        if(!gameRun) { gameRun = true; loop(); }
    }

    function hostReset() {
        if(!isHost) return;
        generateSpacedObstacles();
        conn.send({ type: 'rst', obs: obstacles });
        resetAll(obstacles);
    }

    function resetAll(o) {
        obstacles = o;
        p1 = createP(200, 475, '#ff4757', 0);
        p2 = createP(1600, 475, '#3498db', Math.PI);
        perk = null; perkTimer = 0;
        document.getElementById('game-over').style.display = 'none';
        gameRun = true;
    }

    function announce(t) {
        const a = document.getElementById('announcer');
        a.innerText = t; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 1000);
    }

    const mv = { x: 0, y: 0 }, fr = { x: 0, y: 0, act: false };
    function handleJoy(id, obj) {
        const el = document.getElementById(id), s = el.querySelector('.stick');
        el.addEventListener('touchstart', e => e.preventDefault());
        const move = e => {
            const t = Array.from(e.touches).find(v => v.target.closest('#' + id));
            if (!t) return;
            const r = el.getBoundingClientRect(), dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 55), a = Math.atan2(dy, dx);
            obj.x = Math.cos(a)*(d/55); obj.y = Math.sin(a)*(d/55);
            if(id === 'f-joy') obj.act = true;
            s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        };
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => { obj.x = 0; obj.y = 0; obj.act = false; s.style.transform = `translate(0,0)`; });
    }
    handleJoy('m-joy', mv); handleJoy('f-joy', fr);

    function loop() {
        if (!gameRun) { requestAnimationFrame(loop); return; }
        let me = isHost ? p1 : p2, op = isHost ? p2 : p1;

        if(isHost && !perk && Math.random() < 0.006) {
            perk = { x: 400 + Math.random()*1000, y: 200 + Math.random()*500, t: Math.floor(Math.random()*7) };
            conn.send({ type: 'pk-sp', pk: perk });
        }

        if(perk && Math.hypot(me.x - perk.x, me.y - perk.y) < 55) {
            const list = ["TINY TANK", "TURBO SPEED", "RAPID FIRE", "HEAVY SHELLS", "ONE-TOUCH", "SHIELD", "SMASHER"];
            const keys = ["tiny", "speed", "rapid", "heavy", "insta", "shield", "smasher"];
            me.perk = keys[perk.t];
            perkTimer = Date.now() + 5000;
            conn.send({ type: 'pk-get', n: list[perk.t] });
            announce(list[perk.t]);
            perk = null;
        }

        if(Date.now() > perkTimer) {
            me.perk = ""; me.spd = 4.5; me.sz = 28; me.fr = 350; me.bs = 5; me.bd = 1;
        } else {
            if(me.perk === "tiny") me.sz = 14;
            if(me.perk === "speed") me.spd = 10;
            if(me.perk === "rapid") me.fr = 85;
            if(me.perk === "insta") { me.fr = 1300; me.bd = 10; me.bs = 9; }
            if(me.perk === "heavy") me.bs = 28;
            if(me.perk === "smasher" && Math.hypot(me.x - op.x, me.y - op.y) < me.sz + op.sz) {
                op.hp -= 0.08;
            }
        }

        let nx = me.x + mv.x*me.spd, ny = me.y + mv.y*me.spd;
        let ok = nx > 35 && nx < GW-35 && ny > 35 && ny < GH-35;
        obstacles.forEach(o => { if(nx > o.x-me.sz && nx < o.x+o.w+me.sz && ny > o.y-me.sz && ny < o.y+o.h+me.sz) ok = false; });
        if(ok) { me.x = nx; me.y = ny; }

        let shot = false;
        if (fr.act && Date.now() - lastFire > me.fr) {
            me.ang = Math.atan2(fr.y, fr.x);
            me.bullets.push({x: me.x, y: me.y, vx: Math.cos(me.ang)*25, vy: Math.sin(me.ang)*25, s: me.bs, d: me.bd});
            lastFire = Date.now(); shot = true;
        }
        
        if(conn && conn.open) conn.send({ type: 'sync', x: me.x, y: me.y, ang: me.ang, shot, sz: me.sz, perk: me.perk, hp: me.hp, bs: me.bs, bd: me.bd });

        [me, op].forEach(p => {
            p.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) p.bullets.splice(i, 1); });
                if (p === op && Math.hypot(b.x-me.x, b.y-me.y) < me.sz + 12) {
                    p.bullets.splice(i, 1);
                    if(me.perk !== "shield") me.hp -= b.d;
                }
                if (b.x < 0 || b.x > GW || b.y < 0 || b.y > GH) p.bullets.splice(i, 1);
            });
        });
        
        if(me.hp <= 0) endGame(isHost ? "PLAYER 2 WINS" : "PLAYER 1 WINS");
        else if(op.hp <= 0) endGame(isHost ? "PLAYER 1 WINS" : "PLAYER 2 WINS");

        ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0,0,GW,GH);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 12; ctx.strokeRect(0,0,GW,GH);
        obstacles.forEach(o => { ctx.fillStyle = "#222"; ctx.fillRect(o.x, o.y, o.w, o.h); });
        if(perk) { ctx.fillStyle = "gold"; ctx.fillRect(perk.x-22, perk.y-22, 44, 44); }
        
        [me, op].forEach(p => {
            if(p.hp <= 0) return;
            ctx.fillStyle = "#111"; ctx.fillRect(p.x-45, p.y-70, 90, 8);
            ctx.fillStyle = p.col; ctx.fillRect(p.x-45, p.y-70, (p.hp/10)*90, 8);
            if(p.perk !== "") {
                let l = (perkTimer - Date.now()) / 5000;
                ctx.fillStyle = "gold"; ctx.fillRect(p.x-45, p.y-82, l*90, 5);
            }
            if(p.perk === "shield") { ctx.strokeStyle = "cyan"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(p.x, p.y, p.sz+14, 0, 7); ctx.stroke(); }
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.ang);
            ctx.fillStyle = p.col; ctx.fillRect(-p.sz, -p.sz, p.sz*2, p.sz*2);
            ctx.fillStyle = "#000"; ctx.fillRect(p.sz/2, -6, p.sz, 12); ctx.restore();
            p.bullets.forEach(b => { ctx.fillStyle = "#fff200"; ctx.beginPath(); ctx.arc(b.x, b.y, b.s, 0, 7); ctx.fill(); });
        });
        requestAnimationFrame(loop);
    }

    function endGame(m) { 
        gameRun = false; 
        document.getElementById('game-over').style.display='block'; 
        document.getElementById('res-txt').innerText=m; 
        document.getElementById('restart-btn').style.display = isHost ? 'block' : 'none'; 
    }
</script>
</body>
</html>
