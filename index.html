<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON TANK STRIKE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-red: #ff4757; --neon-blue: #00d2ff; --neon-green: #2ecc71; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        canvas { display: block; filter: drop-shadow(0 0 5px rgba(0,210,255,0.2)); }
        
        /* UI OVERLAY */
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; align-items: center; justify-content: center; }
        #ui > * { pointer-events: auto; }

        /* NEON PANELS */
        .panel { background: rgba(0, 0, 0, 0.9); border: 2px solid var(--neon-green); border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 0 20px var(--neon-green), inset 0 0 10px var(--neon-green); min-width: 300px; }
        h1 { margin: 0 0 20px; font-style: italic; letter-spacing: 4px; text-shadow: 0 0 10px var(--neon-green); }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 16px; }
        .btn-host { background: var(--neon-red); color: white; box-shadow: 0 4px 0 #b33939; }
        .btn-join { background: var(--neon-blue); color: white; box-shadow: 0 4px 0 #0984e3; }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        #host-code-display { font-size: 40px; color: #f1c40f; margin: 15px 0; font-family: monospace; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #333; background: #111; color: white; text-align: center; font-size: 20px; margin-bottom: 10px; box-sizing: border-box; }

        /* GAME OVER */
        #game-over { display: none; border-color: #f1c40f; box-shadow: 0 0 20px #f1c40f; }

        /* JOYSTICKS */
        .joy-con { position: absolute; bottom: 10%; width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #m-joy { left: 50px; } #f-joy { right: 50px; }
        .stick { position: absolute; width: 60px; height: 60px; background: white; border-radius: 50%; top: 40px; left: 40px; opacity: 0.4; box-shadow: 0 0 15px white; }
    </style>
</head>
<body>

<div id="ui">
    <div id="menu" class="panel">
        <h1>TANK STRIKE</h1>
        <button class="btn btn-host" onclick="goFull(); startHost();">Create Room</button>
        <div id="host-code-display">----</div>
        <input type="number" id="join-input" placeholder="Enter Room Code">
        <button class="btn btn-join" onclick="goFull(); startJoin();">Join Room</button>
    </div>

    <div id="game-over" class="panel">
        <h1 id="res-txt">VICTORY</h1>
        <button id="restart-btn" class="btn" style="background:#f39c12; display:none;" onclick="hostReset()">Rematch</button>
        <p id="wait-msg" style="color:#666">Waiting for Host...</p>
    </div>

    <div id="m-joy" class="joy-con"><div class="stick"></div></div>
    <div id="f-joy" class="joy-con"><div class="stick"></div></div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GW = 1920, GH = 1080;
    let scale = 1, obstacles = [], peer, conn, isHost = false, gameRun = false;

    // Standardized Tank Logic
    const createTank = (x, y, col) => ({
        x, y, ang: 0, col, bullets: [], hp: 10, sz: 38, spd: 6, fr: 280
    });

    let p1 = createTank(300, 540, '#ff4757'); // Red
    let p2 = createTank(1620, 540, '#00d2ff'); // Blue

    async function goFull() {
        try {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch(e) {}
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        scale = Math.min(canvas.width / GW, canvas.height / GH);
        ctx.setTransform(scale, 0, 0, scale, (canvas.width - GW * scale) / 2, (canvas.height - GH * scale) / 2);
    }
    window.addEventListener('resize', resize); resize();

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('open', id => document.getElementById('host-code-display').innerText = id);
        peer.on('error', () => initPeer(Math.floor(1000 + Math.random() * 9999).toString()));
    }
    initPeer(Math.floor(1000 + Math.random() * 9999).toString());

    function generateMap() {
        obstacles = [
            {x: 850, y: 150, w: 30, h: 300},
            {x: 1040, y: 630, w: 30, h: 300},
            {x: 600, y: 520, w: 720, h: 30, horizontal: true} // Center divider
        ];
    }

    function startHost() {
        isHost = true; generateMap();
        peer.on('connection', c => { conn = c; setupSync(); });
    }

    function startJoin() {
        conn = peer.connect(document.getElementById('join-input').value);
        setupSync();
    }

    function setupSync() {
        conn.on('open', () => {
            if(isHost) conn.send({ type: 'init', obs: obstacles });
            startGame();
        });
        conn.on('data', d => {
            if(d.type === 'init') { obstacles = d.obs; startGame(); }
            if(d.type === 'sync') {
                let target = isHost ? p2 : p1;
                target.x = d.x; target.y = d.y; target.ang = d.ang; target.hp = d.hp;
                if(d.shot) target.bullets.push({x: d.x, y: d.y, vx: Math.cos(d.ang)*24, vy: Math.sin(d.ang)*24});
            }
            if(d.type === 'rst') resetAll(d.obs);
        });
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-over').style.display = 'none';
        document.querySelectorAll('.joy-con').forEach(j => j.style.display = 'block');
        if(!gameRun) { gameRun = true; loop(); }
    }

    function hostReset() {
        generateMap();
        if(conn) conn.send({ type: 'rst', obs: obstacles });
        resetAll(obstacles);
    }

    function resetAll(o) {
        obstacles = o;
        p1 = createTank(300, 540, '#ff4757');
        p2 = createTank(1620, 540, '#00d2ff');
        document.getElementById('game-over').style.display = 'none';
        gameRun = true;
    }

    // Input Handling
    const mv = { x: 0, y: 0 }, fr = { x: 0, y: 0, act: false };
    let lastFire = 0;

    function handleJoy(id, obj) {
        const el = document.getElementById(id), s = el.querySelector('.stick');
        el.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
        window.addEventListener('touchmove', e => {
            const t = Array.from(e.touches).find(v => v.target.closest('#' + id));
            if (!t) return;
            const r = el.getBoundingClientRect(), dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 55), a = Math.atan2(dy, dx);
            obj.x = Math.cos(a)*(d/55); obj.y = Math.sin(a)*(d/55);
            if(id === 'f-joy' && d > 15) obj.act = true;
            s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        }, {passive:false});
        window.addEventListener('touchend', () => { obj.x = 0; obj.y = 0; obj.act = false; s.style.transform = `translate(0,0)`; });
    }
    handleJoy('m-joy', mv); handleJoy('f-joy', fr);

    function loop() {
        if (!gameRun) { requestAnimationFrame(loop); return; }
        
        let me = isHost ? p1 : p2, op = isHost ? p2 : p1;

        // Physics
        let nx = me.x + mv.x*me.spd, ny = me.y + mv.y*me.spd;
        let ok = nx > 50 && nx < GW-50 && ny > 50 && ny < GH-50;
        obstacles.forEach(o => { if(nx > o.x-me.sz && nx < o.x+o.w+me.sz && ny > o.y-me.sz && ny < o.y+o.h+me.sz) ok = false; });
        if(ok) { me.x = nx; me.y = ny; }

        let shot = false;
        if (fr.act && Date.now() - lastFire > me.fr) {
            me.ang = Math.atan2(fr.y, fr.x);
            me.bullets.push({x: me.x, y: me.y, vx: Math.cos(me.ang)*24, vy: Math.sin(me.ang)*24});
            lastFire = Date.now(); shot = true;
        }

        if(conn && conn.open) conn.send({ type: 'sync', x: me.x, y: me.y, ang: me.ang, shot, hp: me.hp });

        [me, op].forEach(p => {
            p.bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) p.bullets.splice(i, 1); });
                if (p === op && Math.hypot(b.x-me.x, b.y-me.y) < me.sz + 12) {
                    p.bullets.splice(i, 1); me.hp -= 1;
                }
                if (b.x < 0 || b.x > GW || b.y < 0 || b.y > GH) p.bullets.splice(i, 1);
            });
        });

        if(me.hp <= 0 || op.hp <= 0) {
            gameRun = false;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('res-txt').innerText = me.hp <= 0 ? "GAME OVER" : "VICTORY";
            document.getElementById('res-txt').style.color = me.hp <= 0 ? "#ff4757" : "#2ecc71";
            document.getElementById('restart-btn').style.display = isHost ? 'block' : 'none';
            document.getElementById('wait-msg').style.display = isHost ? 'none' : 'block';
        }

        // NEON DRAW ENGINE
        ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
        resize();

        // Draw Grid
        ctx.strokeStyle = "rgba(0, 210, 255, 0.05)"; ctx.lineWidth = 1;
        for(let i=0; i<GW; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,GH); ctx.stroke(); }
        for(let j=0; j<GH; j+=100) { ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(GW,j); ctx.stroke(); }

        // Draw World
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 20; ctx.strokeRect(0,0,GW,GH);
        obstacles.forEach(o => { 
            ctx.shadowBlur = 15; ctx.shadowColor = "#333";
            ctx.fillStyle = "#111"; ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.strokeRect(o.x, o.y, o.w, o.h);
            ctx.shadowBlur = 0;
        });

        [p1, p2].forEach(p => {
            // HP Bar
            ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.roundRect(p.x-50, p.y-85, 100, 10, 5); ctx.fill();
            ctx.fillStyle = p.col; ctx.shadowBlur = 10; ctx.shadowColor = p.col;
            ctx.roundRect(p.x-50, p.y-85, (Math.max(0, p.hp)/10)*100, 10, 5); ctx.fill();
            
            // Tank
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.ang);
            ctx.fillStyle = p.col; ctx.fillRect(-p.sz, -p.sz, p.sz*2, p.sz*2);
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(p.sz-15, -p.sz, 15, p.sz*2); // Shading
            ctx.fillStyle = "white"; ctx.fillRect(p.sz/2, -8, p.sz+5, 16); // Cannon
            ctx.restore();
            
            // Bullets
            p.bullets.forEach(b => { 
                ctx.fillStyle = "white"; ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
                ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, 7); ctx.fill(); 
            });
            ctx.shadowBlur = 0;
        });
        requestAnimationFrame(loop);
    }
    
    // Polyfill for roundRect on older mobile browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
            this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
            this.arcTo(x, y, x + w, y, r); this.closePath(); return this;
        };
    }
</script>
</body>
</html>
