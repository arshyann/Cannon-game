<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Strike: Master Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        #ui > * { pointer-events: auto; }
        #menu, #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 30px; border-radius: 15px; text-align: center; border: 3px solid #2ecc71; width: 320px; color: white; }
        #game-over { display: none; border-color: #f1c40f; z-index: 100; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; background: #333; color: #fff; text-align: center; font-size: 20px; width: 100%; }
        button { padding: 12px; cursor: pointer; background: #2ecc71; border: none; color: white; font-weight: bold; border-radius: 8px; text-transform: uppercase; }
        #host-id { margin: 10px 0; color: #f1c40f; font-size: 32px; font-weight: bold; }
        .joy-con { position: absolute; bottom: 12%; width: 140px; height: 140px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; border: 1px solid rgba(255,255,255,0.2); }
        #m-joy { left: 50px; }
        #f-joy { right: 50px; }
        .stick { position: absolute; width: 60px; height: 60px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 40px; left: 40px; pointer-events: none; }
        #announcer { position: absolute; top: 15%; width: 100%; text-align: center; font-size: 40px; color: #f1c40f; font-weight: bold; display: none; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="ui">
    <div id="announcer">READY</div>
    <div id="menu">
        <h2 style="margin:0 0 10px 0">TANK STRIKE</h2>
        <div class="controls">
            <button onclick="goFull(); startHost();">HOST GAME</button>
            <div id="host-id">----</div>
            <input type="number" id="join-code" placeholder="ENTER CODE">
            <button style="background:#3498db" onclick="goFull(); startJoin();">JOIN GAME</button>
        </div>
    </div>
    <div id="game-over">
        <h1 id="res-txt" style="margin-top:0">GAME OVER</h1>
        <button id="restart-btn" style="background:#f39c12; width:100%; display:none;" onclick="hostReset()">PLAY AGAIN</button>
        <p id="wait-msg" style="color:#888; display:none;">Waiting for Host...</p>
    </div>
    <div id="m-joy" class="joy-con"><div class="stick"></div></div>
    <div id="f-joy" class="joy-con"><div class="stick"></div></div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GW = 2000, GH = 1000;
    let scale = 1, obstacles = [], peer, conn, isHost = false, gameRun = false;
    let perk = null, perkTimer = 0, lastFire = 0;

    async function goFull() {
        try {
            if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
        } catch(e) {}
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        scale = Math.min(canvas.width / GW, canvas.height / GH);
        ctx.setTransform(scale, 0, 0, scale, (canvas.width - GW * scale) / 2, (canvas.height - GH * scale) / 2);
    }
    window.addEventListener('resize', resize); resize();

    const createP = (x, y, col) => ({
        x, y, ang: 0, col, bullets: [], hp: 10, sz: 32, spd: 5, fr: 350, bs: 6, bd: 1, perk: ""
    });

    let p1 = createP(250, 500, '#ff3e3e'); // Red (Host)
    let p2 = createP(1750, 500, '#00a8ff'); // Blue (Joiner)

    function initPeer(id) {
        peer = new Peer(id);
        peer.on('error', () => initPeer(Math.floor(1000 + Math.random() * 9000).toString()));
    }
    initPeer(Math.floor(1000 + Math.random() * 9000).toString());

    function generateObstacles() {
        obstacles = [];
        const pos = [{x:750,y:150}, {x:1200,y:600}, {x:975,y:400}];
        pos.forEach(p => obstacles.push({x: p.x, y: p.y, w: 50, h: 250}));
    }

    function startHost() {
        isHost = true;
        generateObstacles();
        document.getElementById('host-id').innerText = peer.id;
        peer.on('connection', c => { conn = c; setupSync(); });
    }

    function startJoin() {
        conn = peer.connect(document.getElementById('join-code').value);
        setupSync();
    }

    function setupSync() {
        conn.on('open', () => {
            if(isHost) conn.send({ type: 'init', obs: obstacles });
            startGame();
        });
        conn.on('data', d => {
            if(d.type === 'init') { obstacles = d.obs; startGame(); }
            
            if(isHost) {
                // Host receives inputs from Joiner
                if(d.type === 'input') {
                    p2.x = d.x; p2.y = d.y; p2.ang = d.ang;
                    if(d.shot) p2.bullets.push({x: d.x, y: d.y, vx: Math.cos(d.ang)*25, vy: Math.sin(d.ang)*25, s: p2.bs, d: p2.bd});
                }
            } else {
                // Joiner receives entire state from Host (The Master Truth)
                if(d.type === 'master-sync') {
                    p1.x = d.p1.x; p1.y = d.p1.y; p1.ang = d.p1.ang; p1.hp = d.p1.hp; p1.sz = d.p1.sz; p1.perk = d.p1.perk;
                    p2.x = d.p2.x; p2.y = d.p2.y; p2.ang = d.p2.ang; p2.hp = d.p2.hp; p2.sz = d.p2.sz; p2.perk = d.p2.perk;
                    p1.bullets = d.p1b; p2.bullets = d.p2b;
                    perk = d.perk; perkTimer = d.perkTimer;
                }
                if(d.type === 'game-over') endGame(d.msg);
            }
            if(d.type === 'rst') resetAll(d.obs);
            if(d.type === 'ann') announce(d.txt);
        });
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('game-over').style.display = 'none';
        document.querySelectorAll('.joy-con').forEach(j => j.style.display = 'block');
        if(!gameRun) { gameRun = true; loop(); }
    }

    function hostReset() {
        generateObstacles();
        conn.send({ type: 'rst', obs: obstacles });
        resetAll(obstacles);
    }

    function resetAll(o) {
        obstacles = o;
        p1 = createP(250, 500, '#ff3e3e');
        p2 = createP(1750, 500, '#00a8ff');
        perk = null; perkTimer = 0;
        document.getElementById('game-over').style.display = 'none';
        gameRun = true;
    }

    function announce(t) {
        const a = document.getElementById('announcer');
        a.innerText = t; a.style.display = 'block';
        setTimeout(() => a.style.display = 'none', 1200);
    }

    const mv = { x: 0, y: 0 }, fr = { x: 0, y: 0, act: false };
    function handleJoy(id, obj) {
        const el = document.getElementById(id), s = el.querySelector('.stick');
        el.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
        window.addEventListener('touchmove', e => {
            const t = Array.from(e.touches).find(v => v.target.closest('#' + id));
            if (!t) return;
            const r = el.getBoundingClientRect(), dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 60), a = Math.atan2(dy, dx);
            obj.x = Math.cos(a)*(d/60); obj.y = Math.sin(a)*(d/60);
            if(id === 'f-joy') obj.act = true;
            s.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        }, {passive:false});
        window.addEventListener('touchend', () => { obj.x = 0; obj.y = 0; obj.act = false; s.style.transform = `translate(0,0)`; });
    }
    handleJoy('m-joy', mv); handleJoy('f-joy', fr);

    function loop() {
        if (!gameRun) { requestAnimationFrame(loop); return; }
        
        // --- MOVEMENT CALCULATED LOCALLY FOR FEEL ---
        let me = isHost ? p1 : p2;
        let nx = me.x + mv.x*me.spd, ny = me.y + mv.y*me.spd;
        let ok = nx > 40 && nx < GW-40 && ny > 40 && ny < GH-40;
        obstacles.forEach(o => { if(nx > o.x-me.sz && nx < o.x+o.w+me.sz && ny > o.y-me.sz && ny < o.y+o.h+me.sz) ok = false; });
        if(ok) { me.x = nx; me.y = ny; }

        let shot = false;
        if (fr.act && Date.now() - lastFire > me.fr) {
            me.ang = Math.atan2(fr.y, fr.x);
            if(isHost) me.bullets.push({x: me.x, y: me.y, vx: Math.cos(me.ang)*25, vy: Math.sin(me.ang)*25, s: me.bs, d: me.bd});
            lastFire = Date.now(); shot = true;
        }

        // --- HOST LOGIC (THE MASTER) ---
        if(isHost) {
            if(!perk && Math.random() < 0.005) {
                perk = { x: 500+Math.random()*1000, y: 200+Math.random()*600, t: Math.floor(Math.random()*7) };
            }

            [p1, p2].forEach(p => {
                if(perk && Math.hypot(p.x - perk.x, p.y - perk.y) < 60) {
                    const names = ["TINY TANK", "TURBO SPEED", "RAPID FIRE", "HEAVY SHELLS", "ONE-TOUCH", "SHIELD", "SMASHER"];
                    const keys = ["tiny", "speed", "rapid", "heavy", "insta", "shield", "smasher"];
                    p.perk = keys[perk.t]; 
                    perkTimer = Date.now() + 5000;
                    conn.send({type: 'ann', txt: names[perk.t]}); announce(names[perk.t]);
                    perk = null;
                }

                if(p.perk && Date.now() > perkTimer) {
                    p.perk = ""; p.spd = 5; p.sz = 32; p.fr = 350; p.bs = 6; p.bd = 1;
                } else if(p.perk) {
                    if(p.perk === "tiny") p.sz = 16;
                    if(p.perk === "speed") p.spd = 12;
                    if(p.perk === "rapid") p.fr = 80;
                    if(p.perk === "insta") { p.fr = 1300; p.bd = 10; p.bs = 10; }
                    if(p.perk === "heavy") p.bs = 32;
                }
            });

            // Smasher & Bullets (Host only)
            if(p1.perk === "smasher" && Math.hypot(p1.x-p2.x, p1.y-p2.y) < p1.sz+p2.sz) p2.hp -= 0.1;
            if(p2.perk === "smasher" && Math.hypot(p1.x-p2.x, p1.y-p2.y) < p1.sz+p2.sz) p1.hp -= 0.1;

            [p1, p2].forEach(p => {
                let enemy = (p === p1) ? p2 : p1;
                p.bullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    obstacles.forEach(o => { if(b.x > o.x && b.x < o.x+o.w && b.y > o.y && b.y < o.y+o.h) p.bullets.splice(i, 1); });
                    if (Math.hypot(b.x-enemy.x, b.y-enemy.y) < enemy.sz + 15) {
                        p.bullets.splice(i, 1);
                        if(enemy.perk !== "shield") enemy.hp -= b.d;
                    }
                    if (b.x < 0 || b.x > GW || b.y < 0 || b.y > GH) p.bullets.splice(i, 1);
                });
            });

            // Master Sync outgoing
            conn.send({ type: 'master-sync', p1, p2, p1b: p1.bullets, p2b: p2.bullets, perk, perkTimer });

            if(p1.hp <= 0 || p2.hp <= 0) {
                let msg = p1.hp <= 0 ? "PLAYER 2 WINS" : "PLAYER 1 WINS";
                conn.send({ type: 'game-over', msg }); endGame(msg);
            }
        } else {
            // Joiner simply sends inputs
            conn.send({ type: 'input', x: p2.x, y: p2.y, ang: p2.ang, shot });
        }

        // --- DRAW ---
        ctx.setTransform(1,0,0,1,0,0); ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        resize();
        ctx.strokeStyle = "#333"; ctx.lineWidth = 15; ctx.strokeRect(0,0,GW,GH);
        obstacles.forEach(o => { ctx.fillStyle = "#222"; ctx.fillRect(o.x, o.y, o.w, o.h); });
        if(perk) { ctx.fillStyle = "gold"; ctx.fillRect(perk.x-25, perk.y-25, 50, 50); }

        [p1, p2].forEach(p => {
            if(p.hp <= 0) return;
            ctx.fillStyle = "#111"; ctx.fillRect(p.x-50, p.y-80, 100, 10);
            ctx.fillStyle = p.col; ctx.fillRect(p.x-50, p.y-80, (p.hp/10)*100, 10);
            if(p.perk) {
                let l = Math.max(0, (perkTimer - Date.now()) / 5000);
                ctx.fillStyle = "gold"; ctx.fillRect(p.x-50, p.y-95, l*100, 6);
            }
            if(p.perk === "shield") { ctx.strokeStyle = "cyan"; ctx.lineWidth = 5; ctx.beginPath(); ctx.arc(p.x, p.y, p.sz+15, 0, 7); ctx.stroke(); }
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.ang);
            ctx.fillStyle = p.col; ctx.fillRect(-p.sz, -p.sz, p.sz*2, p.sz*2);
            ctx.fillStyle = "#000"; ctx.fillRect(p.sz/2, -8, p.sz, 16); ctx.restore();
            p.bullets.forEach(b => { ctx.fillStyle = "#fff200"; ctx.beginPath(); ctx.arc(b.x, b.y, b.s, 0, 7); ctx.fill(); });
        });
        requestAnimationFrame(loop);
    }

    function endGame(m) { 
        gameRun = false; document.getElementById('game-over').style.display = 'block';
        document.getElementById('res-txt').innerText = m;
        if(isHost) { document.getElementById('restart-btn').style.display = 'block'; document.getElementById('wait-msg').style.display = 'none'; }
        else { document.getElementById('restart-btn').style.display = 'none'; document.getElementById('wait-msg').style.display = 'block'; }
    }
</script>
</body>
</html>
